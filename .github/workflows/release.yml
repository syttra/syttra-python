name: Release

# Triggered by pushing a tag like v0.2.0. The job:
#
#   1. verifies the tag matches the version in pyproject.toml
#      (so a typo'd tag can't ship a wrong-versioned wheel),
#   2. builds sdist + wheel,
#   3. publishes to PyPI via Trusted Publishing (OIDC — no API
#      tokens, no secrets to rotate),
#   4. creates a GitHub release with the dists attached and the
#      matching CHANGELOG section as release notes.
#
# Trusted-publishing setup is one-time per project — see RUNBOOK.md
# for the steps.

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Verify tag matches pyproject version
        # Catches the "I tagged v0.2.0 but forgot to bump pyproject"
        # mistake before we publish a mismatched wheel to PyPI
        # (which is append-only — the version can never be reused).
        run: |
          TAG="${GITHUB_REF##refs/tags/v}"
          VER=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "tag=v$TAG  pyproject=$VER"
          if [ "$TAG" != "$VER" ]; then
            echo "::error::Tag v$TAG does not match pyproject version $VER"
            exit 1
          fi

      - name: Build sdist + wheel
        run: python -m build
      - name: twine check
        run: twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: Publish to PyPI
    needs: [build]
    runs-on: ubuntu-latest
    # Environment gate: in PyPI's trusted-publishing config we pin
    # `environment = pypi`, so jobs from any other workflow / job
    # name can't accidentally claim the OIDC token.
    environment:
      name: pypi
      url: https://pypi.org/p/syttra
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: GitHub release
    needs: [publish-pypi]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Extract release notes from CHANGELOG
        # Pulls the section between the matching `## [VER]` heading
        # and the next `## [` so the release page mirrors the
        # CHANGELOG entry. If no matching section exists (forgotten
        # changelog update) we fall back to a one-line placeholder.
        id: notes
        run: |
          TAG="${GITHUB_REF##refs/tags/}"
          VER="${TAG#v}"
          awk -v ver="$VER" '
            $0 ~ "^## \\[" ver "\\]" { capture=1; next }
            capture && $0 ~ "^## \\[" { exit }
            capture { print }
          ' CHANGELOG.md > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "Release $TAG (no CHANGELOG section found)." > release_notes.md
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: release_notes.md
          files: dist/*
